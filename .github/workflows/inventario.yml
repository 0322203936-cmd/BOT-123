name: Bot Inventario

on:
  workflow_dispatch:
    inputs:
      actualizar_sharepoint:
        description: Actualizar las cuatro columnas de Inventario
        required: true
        type: boolean
        default: true

concurrency:
  group: bot-inventario-sharepoint
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  inventario:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - name: Instalar dependencias
        run: |
          pip install -r bot/requirements.txt
          playwright install --with-deps chromium

      - name: Descargar Inventario General
        env:
          POSCO_USER: ${{ secrets.POSCO_USER }}
          POSCO_PASSWORD: ${{ secrets.POSCO_PASSWORD }}
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          INVENTARIO_UPLOAD: ${{ inputs.actualizar_sharepoint }}
        run: python -u bot/inventario.py

      - name: Guardar capturas y reporte
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capturas-inventario-${{ github.run_number }}
          path: artifacts/inventario/**/*
          if-no-files-found: warn
          retention-days: 7
