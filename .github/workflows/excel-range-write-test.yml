name: Probar escritura A-R en copia temporal

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  probar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descargar reporte real
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: 29384108489
          name: capturas-pegar-data-22
          path: artifacts/source

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests openpyxl lxml

      - name: Reemplazar A-R en una copia temporal
        env:
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
        run: python -u bot/excel_range_write_test.py
