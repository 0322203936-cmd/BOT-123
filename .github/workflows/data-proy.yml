name: Bot Data Proy - Cruce Plan Cosecha y Requerimientos

on:
  workflow_dispatch:
    inputs:
      actualizar_sharepoint:
        description: Sobrescribir el archivo de SharePoint (Requerimientos)
        required: true
        type: boolean
        default: true

concurrency:
  group: data-proy-sharepoint
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  cruzar-datos:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - name: Instalar dependencias
        run: |
          pip install -r bot/requirements.txt

      - name: Procesar Datos y Subir a SharePoint
        env:
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_UPLOAD: ${{ inputs.actualizar_sharepoint }}
        run: python bot/data_proy.py

      - name: Guardar reporte de ejecución
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-data-proy-${{ github.run_number }}
          path: |
            artifacts/sharepoint/*
          if-no-files-found: warn
          retention-days: 7
