name: Bot Pegar Data - Exploracion Posco

on:
  workflow_dispatch:
    inputs:
      actualizar_sharepoint:
        description: Sobrescribir el archivo de SharePoint
        required: true
        type: boolean
        default: false
      crear_copia_prueba:
        description: Crear un archivo separado para validar en Excel Online
        required: true
        type: boolean
        default: false

concurrency:
  group: pegar-data-sharepoint
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  explorar-ordenes:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - name: Instalar dependencias
        run: |
          pip install -r bot/requirements.txt
          playwright install --with-deps chromium

      - name: Entrar a Ordenes en Posco
        env:
          POSCO_USER: ${{ secrets.POSCO_USER }}
          POSCO_PASSWORD: ${{ secrets.POSCO_PASSWORD }}
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_UPLOAD: ${{ inputs.actualizar_sharepoint }}
          SHAREPOINT_TEST_COPY: ${{ inputs.crear_copia_prueba }}
        run: python bot/pegar_data.py

      - name: Guardar capturas y reporte
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capturas-pegar-data-${{ github.run_number }}
          path: |
            artifacts/capturas/*.png
            artifacts/reportes/*
            artifacts/sharepoint/*_actualizado.xlsm
          if-no-files-found: warn
          retention-days: 7
