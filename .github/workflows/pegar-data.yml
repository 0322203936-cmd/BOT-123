name: Bot Pegar Data - Exploracion Posco

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  explorar-ordenes:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - name: Instalar dependencias
        run: |
          pip install -r bot/requirements.txt
          playwright install --with-deps chromium

      - name: Entrar a Ordenes en Posco
        env:
          POSCO_USER: ${{ secrets.POSCO_USER }}
          POSCO_PASSWORD: ${{ secrets.POSCO_PASSWORD }}
        run: python bot/pegar_data.py

      - name: Guardar capturas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capturas-pegar-data-${{ github.run_number }}
          path: artifacts/capturas/*.png
          if-no-files-found: warn
          retention-days: 7
